<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="box">
        <a href="index.html" class="home-icon"><i class="fas fa-home"></i> Home</a>
        <h2>Registration</h2>
        <input type="text" id="name" placeholder="Full Name">
        <input type="text" id="roll" placeholder="Roll Number">
        <input type="text" id="course" placeholder="Course Name">
        <select id="exam">
            <option value="">Select Exam</option>
            <option>First Semester</option>
            <option>Second Semester</option>
            <option>Third Semester</option>
            <option>Fourth Semester</option>
        </select>
        <button onclick="register()">Submit Registration</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
